name: Publish Artifacts
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"
jobs:
  build-shards:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            filter: linuxX64
          - os: windows-latest
            filter: windowsX64
          - os: macos-latest
            filter: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Assert Architecture
        shell: bash
        run: bash scripts/assert-architecture.sh "${{ matrix.os }}"
      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Clean Project
        run: ./gradlew clean
      - name: Publish to Maven Local
        shell: bash
        run: ./gradlew check publishToMavenLocal -Pfilter=${{ matrix.filter }}
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASS }}
          ORG_GRADLE_PROJECT_nexusUsername: ${{ secrets.NEXUS_USERNAME }}
          ORG_GRADLE_PROJECT_nexusPassword: ${{ secrets.NEXUS_PASSWORD }}
      - name: Zip Maven Local
        shell: bash
        run: |
          mkdir -p ~/m2-archive
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            cd ~/.m2/repository
            powershell -Command "Compress-Archive -Path com -DestinationPath \$env:USERPROFILE\\m2-archive\\m2-repository.zip"
          else
            cd ~/.m2/repository
            zip -r ~/m2-archive/m2-repository.zip com/episode6/redux
          fi
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: m2-${{ matrix.filter }}
          path: ~/m2-archive/m2-repository.zip
          compression-level: 0

  aggregate-and-publish:
    needs: build-shards
    runs-on: ubuntu-latest
    if: github.repository == 'episode6/redux-store-flow'
    steps:
      - uses: actions/checkout@v6
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: m2-zips
      - name: Merge Artifacts
        run: |
          set -x
          python3 scripts/merge-m2-shards.py --input m2-zips --output bundle || { echo "Merge script failed"; exit 1; }
          
          echo "Bundle content summary:"
          find bundle -maxdepth 5 | head -n 100
      - name: Sign and Checksum
        env:
          GPG_KEY: ${{ secrets.GPG_KEY }}
          GPG_PASS: ${{ secrets.GPG_PASS }}
        run: |
          set -e
          # Skip signing/checksumming for snapshot bundles
          if cd bundle && find . -type f | grep -q -- '-SNAPSHOT'; then
            echo "Snapshot bundle detected — skipping Sign and Checksum step"
            exit 0
          fi

          # Import GPG key
          echo "$GPG_KEY" | gpg --batch --import
          
          cd bundle
          # Remove any existing signatures or checksums from shards
          find . -type f \( -name "*.asc" -o -name "*.md5" -o -name "*.sha1" -o -name "*.sha256" -o -name "*.sha512" \) -delete

          # Sign all artifacts (JARs, POMs, Modules, Klibs, etc.)
          find . -type f ! -name "*.asc" ! -name "*.md5" ! -name "*.sha1" ! -name "*.sha256" ! -name "*.sha512" | while read -r file; do
            gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASS" --detach-sign --armor "$file" || exit 1
          done

          # Generate checksums for ALL files (including the .asc files we just created)
          find . -type f ! -name "*.md5" ! -name "*.sha1" ! -name "*.sha256" ! -name "*.sha512" | while read -r file; do
            echo "Generating checksums for $file"
            for alg in md5 sha1 sha256 sha512; do
              if [ "$alg" == "md5" ]; then
                md5sum "$file" | cut -d ' ' -f 1 > "$file.md5" || exit 1
              elif [ "$alg" == "sha1" ]; then
                sha1sum "$file" | cut -d ' ' -f 1 > "$file.sha1" || exit 1
              elif [ "$alg" == "sha256" ]; then
                sha256sum "$file" | cut -d ' ' -f 1 > "$file.sha256" || exit 1
              elif [ "$alg" == "sha512" ]; then
                sha512sum "$file" | cut -d ' ' -f 1 > "$file.sha512" || exit 1
              fi
            done
          done
      - name: Create Sonatype Bundle
        run: |
          cd bundle
          zip -r ../sonatype-bundle.zip .
      - name: Upload Bundle to GitHub
        uses: actions/upload-artifact@v7
        with:
          name: sonatype-bundle
          path: sonatype-bundle.zip
          compression-level: 0
      - name: Publish to Sonatype Central
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          set -e
          # If any file path contains -SNAPSHOT treat as a snapshot and upload files individually
          if cd bundle && find . -type f | grep -q -- '-SNAPSHOT'; then
            echo "Snapshot artifacts detected — uploading files individually to maven-snapshots"
            AUTH_BASIC=$(printf "%s:%s" "$NEXUS_USERNAME" "$NEXUS_PASSWORD" | base64 | tr -d '\n')
            # Exclude signature and checksum files from snapshot uploads
            find . -type f \( ! -name "*.asc" -a ! -name "*.md5" -a ! -name "*.sha1" -a ! -name "*.sha256" -a ! -name "*.sha512" \) -print | while read -r file; do
              rel="${file#./}"
              url="https://central.sonatype.com/repository/maven-snapshots/${rel}"
              echo "Uploading $rel"
              # Use HTTP PUT with Basic auth and binary data to mimic Maven Wagon behavior
              curl --silent --show-error --fail -X PUT \
                -H "Authorization: Basic ${AUTH_BASIC}" \
                -H "Content-Type: application/octet-stream" \
                --data-binary @"$file" "$url" || { echo "Failed uploading $rel"; exit 1; }
            done
          else
            SONATYPE_TOKEN=$(printf "%s:%s" "$NEXUS_USERNAME" "$NEXUS_PASSWORD" | base64 | tr -d '\n')
            curl --request POST \
              --header "Authorization: Bearer ${SONATYPE_TOKEN}" \
              --form bundle=@sonatype-bundle.zip \
              'https://central.sonatype.com/api/v1/publisher/upload'
          fi

  docs-and-deploy:
    needs: aggregate-and-publish
    runs-on: macos-latest
    if: github.repository == 'episode6/redux-store-flow'
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Clean Project
        run: ./gradlew clean
      - name: Generate Docs
        run: ./gradlew dokkaGenerateHtml
      - name: Sync Docs
        run: ./gradlew syncDocs
      - name: Deploy root docs to website
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: site
          FOLDER: build/site
          TARGET_FOLDER: /
          CLEAN: false
      - name: Deploy dokka to website
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: site
          FOLDER: build/dokka/html
          TARGET_FOLDER: /docs/${{ github.ref_name }}/
          CLEAN: true
