name: Publish Artifacts
on:
  push:
    branches:
      - main
    tags:
      - '**'
env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"
jobs:
  publish-job:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            filter: linuxX64
          - os: windows-latest
            filter: windowsX64
          - os: macos-latest
            filter: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - name: Assert Architecture
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            macos-latest)
              if [ "$(uname -m)" != "arm64" ]; then
                echo "Not running on arm64 architecture"
                exit 1
              fi
              ;;
            ubuntu-latest|windows-latest)
              if [[ ! "$(uname -m)" =~ (x86_64|x64|AMD64) ]]; then
                echo "Not running on x64 architecture: $(uname -m)"
                exit 1
              fi
              ;;
          esac
      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
      - name: Clean Project
        run: ./gradlew clean
      - name: Generate Docs
        if: matrix.filter == 'macos'
        run: ./gradlew dokkaHtml
      - name: Publish
        run: ./gradlew publish -Pfilter=${{ matrix.filter }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_nexusUsername: ${{ secrets.NEXUS_USERNAME }}
          ORG_GRADLE_PROJECT_nexusPassword: ${{ secrets.NEXUS_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASS }}
      - name: Sync Docs
        if: matrix.filter == 'macos'
        run: ./gradlew syncDocs
      - name: Deploy root docs to website
        if: ${{ matrix.filter == 'macos' && github.ref_type == 'tag' && github.repository == 'episode6/redux-store-flow' }}
        uses: JamesIves/github-pages-deploy-action@132898c54c57c7cc6b80eb3a89968de8fc283505
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: site
          FOLDER: build/site
          TARGET_FOLDER: /
          CLEAN: false
      - name: Deploy dokka to website
        if: ${{ matrix.filter == 'macos' && github.repository == 'episode6/redux-store-flow' }}
        uses: JamesIves/github-pages-deploy-action@132898c54c57c7cc6b80eb3a89968de8fc283505
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: site
          FOLDER: build/dokka/html
          TARGET_FOLDER: /docs/${{ github.ref_name }}/
          CLEAN: true
