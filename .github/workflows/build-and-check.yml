name: Build and Check
on:
  push:
    branches:
      - 'release/**'
  pull_request:
env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"
jobs:
  build-and-check:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            filter: linuxX64
          - os: windows-latest
            filter: windowsX64
          - os: macos-latest
            filter: macos
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Assert Architecture
      shell: bash
      run: bash scripts/assert-architecture.sh "${{ matrix.os }}"
    - name: Set up JDK 23
      uses: actions/setup-java@v5
      with:
        java-version: '23'
        distribution: 'zulu'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
    - name: Assemble Project
      run: ./gradlew assemble -Pfilter=${{ matrix.filter }}
    - name: Check Project
      run: ./gradlew check -Pfilter=${{ matrix.filter }}
    - name: Generate Docs
      if: matrix.filter == 'macos'
      run: ./gradlew dokkaGenerateHtml
