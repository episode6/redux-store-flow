name: Build and Check
on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"
jobs:
  build-and-check:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            filter: x64
          - os: macos-latest
            filter: nonX64
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v3
    - name: Assert ARM64
      if: matrix.os == 'macos-latest'
      run: |
        if [ "$(uname -m)" != "arm64" ]; then
          echo "Not running on arm64 architecture"
          exit 1
        fi
    - name: Set up JDK 23
      uses: actions/setup-java@v5
      with:
        java-version: '23'
        distribution: 'zulu'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-provider: basic
    - name: Assemble Project
      run: ./gradlew assemble -Pfilter=${{ matrix.filter }}
    - name: Check Project
      run: ./gradlew check -Pfilter=${{ matrix.filter }}
    - name: Generate Docs
      if: matrix.filter == 'nonX64'
      run: ./gradlew dokkaHtml
