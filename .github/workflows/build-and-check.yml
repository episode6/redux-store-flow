name: Build and Check
on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"
jobs:
  build-and-check:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            filter: linuxX64
          - os: windows-latest
            filter: windowsX64
          - os: macos-latest
            filter: macos
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v3
    - name: Assert Architecture
      shell: bash
      run: |
        case "${{ matrix.os }}" in
          macos-latest)
            if [ "$(uname -m)" != "arm64" ]; then
              echo "Not running on arm64 architecture"
              exit 1
            fi
            ;;
          ubuntu-latest|windows-latest)
            if [[ ! "$(uname -m)" =~ (x86_64|x64|AMD64) ]]; then
              echo "Not running on x64 architecture: $(uname -m)"
              exit 1
            fi
            ;;
        esac
    - name: Set up JDK 23
      uses: actions/setup-java@v5
      with:
        java-version: '23'
        distribution: 'zulu'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-provider: basic
    - name: Assemble Project
      run: ./gradlew assemble -Pfilter=${{ matrix.filter }}
    - name: Check Project
      run: ./gradlew check -Pfilter=${{ matrix.filter }}
    - name: Generate Docs
      if: matrix.filter == 'macos'
      run: ./gradlew dokkaHtml
