name: Windows Checks
on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 11
      uses: actions/setup-java@v2
      with:
        java-version: '11'
        distribution: 'adopt'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Clean Project
      run: ./gradlew clean
    - name: Assemble Windows
      run: ./gradlew assembleWindows
    - name: Check Windows
      run: ./gradlew testWindows
    - name: Install Windows
      run: ./gradlew installWindowsBuildDir
    - uses: actions/upload-artifact@v3
      with:
        name: win-artifacts
        path: build/m2
